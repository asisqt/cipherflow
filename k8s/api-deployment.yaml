apiVersion: apps/v1
kind: Deployment
metadata:
  name: cipherflow-api
  namespace: default
  labels:
    app: cipherflow
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cipherflow
      component: api
  template:
    metadata:
      labels:
        app: cipherflow
        component: api
    spec:
      containers:
      - name: api
        image: registry.digitalocean.com/cipherflow-registry/cipherflow:latest
        ports:
        - containerPort: 8000
          protocol: TCP
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: cipherflow-secrets
              key: secret-key
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: cipherflow-secrets
              key: encryption-key
        - name: ENVIRONMENT
          value: "production"
        - name: CORS_ORIGINS
          value: '["*"]'
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: cipherflow-api
  namespace: default
  labels:
    app: cipherflow
    component: api
spec:
  type: ClusterIP
  selector:
    app: cipherflow
    component: api
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP

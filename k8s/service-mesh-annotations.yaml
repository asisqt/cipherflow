apiVersion: v1
kind: ConfigMap
metadata:
  name: cipherflow-mesh-config
  namespace: default
  labels:
    app: cipherflow
    component: service-mesh
  annotations:
    description: "Service mesh configuration for Istio/Linkerd integration"
data:
  mesh-config.yaml: |
    # Service Mesh Integration Guide
    # CipherFlow is service-mesh ready with these annotations

    istio:
      # Add to pod template metadata.annotations:
      sidecar.istio.io/inject: "true"
      traffic.sidecar.istio.io/excludeInboundPorts: ""
      proxy.istio.io/config: |
        holdApplicationUntilProxyStarts: true
        proxyStatsMatcher:
          inclusionRegexps:
            - ".*cipherflow.*"

    linkerd:
      # Add to pod template metadata.annotations:
      linkerd.io/inject: enabled
      config.linkerd.io/proxy-await: enabled
      config.linkerd.io/default-inbound-policy: cluster-authenticated

    # mTLS enforcement
    mtls:
      mode: STRICT
      # All inter-service communication encrypted
      # No plaintext traffic allowed within the mesh

    # Circuit breaker settings
    circuit_breaker:
      consecutive_errors: 5
      interval: 30s
      base_ejection_time: 30s
      max_ejection_percent: 50

    # Retry policy
    retries:
      attempts: 3
      per_try_timeout: 10s
      retry_on: "5xx,reset,connect-failure"

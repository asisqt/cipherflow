apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: cipherflow-critical
  labels:
    app: cipherflow
value: 1000000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Priority class for CipherFlow API pods — ensures scheduling priority during resource contention"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: cipherflow-standard
  labels:
    app: cipherflow
value: 500000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Priority class for CipherFlow frontend pods"

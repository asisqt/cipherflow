apiVersion: v1
kind: ResourceQuota
metadata:
  name: cipherflow-quota
  namespace: default
  labels:
    app: cipherflow
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "10"
    services: "5"
    services.loadbalancers: "3"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: cipherflow-limits
  namespace: default
  labels:
    app: cipherflow
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: 256Mi
    defaultRequest:
      cpu: "100m"
      memory: 128Mi
    max:
      cpu: "1"
      memory: 512Mi
    min:
      cpu: "50m"
      memory: 64Mi

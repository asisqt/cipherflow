apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cipherflow-api-policy
  namespace: default
  labels:
    app: cipherflow
spec:
  podSelector:
    matchLabels:
      app: cipherflow
      component: api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: cipherflow
          component: frontend
    ports:
    - protocol: TCP
      port: 8000
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cipherflow-frontend-policy
  namespace: default
  labels:
    app: cipherflow
spec:
  podSelector:
    matchLabels:
      app: cipherflow
      component: frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: cipherflow
          component: api
    ports:
    - protocol: TCP
      port: 8000
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

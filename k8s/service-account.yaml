apiVersion: v1
kind: ServiceAccount
metadata:
  name: cipherflow-api-sa
  namespace: default
  labels:
    app: cipherflow
    component: api
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cipherflow-frontend-sa
  namespace: default
  labels:
    app: cipherflow
    component: frontend
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cipherflow-api-role
  namespace: default
  labels:
    app: cipherflow
spec:
  rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["cipherflow-config"]
    verbs: ["get", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["cipherflow-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cipherflow-api-binding
  namespace: default
  labels:
    app: cipherflow
spec:
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: cipherflow-api-role
  subjects:
  - kind: ServiceAccount
    name: cipherflow-api-sa
    namespace: default

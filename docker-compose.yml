version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TAG: local-compose
        BUILD_COMMIT: development
    container_name: cipherflow-api
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=local-dev-secret-key-32-chars!!
      - ENCRYPTION_KEY=local-dev-fernet-key-32-bytes!!
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - cipherflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: cipherflow-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cipherflow-net

networks:
  cipherflow-net:
    driver: bridge
    name: cipherflow-network

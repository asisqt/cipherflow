name: CipherFlow CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.4.4
      - run: ruff check src/ tests/

  test:
    name: Test (unit + integration + BDD)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Create __init__.py files
        run: |
          touch src/__init__.py src/api/__init__.py \
                src/core/__init__.py src/services/__init__.py \
                tests/__init__.py tests/unit/__init__.py \
                tests/integration/__init__.py
      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=40
        env:
          SECRET_KEY: test-secret-key-min-32-chars-here!!
          ENCRYPTION_KEY: test-encrypt-32-bytes-padding-here!
      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          SECRET_KEY: test-secret-key-min-32-chars-here!!
          ENCRYPTION_KEY: test-encrypt-32-bytes-padding-here!
      - name: Run BDD tests (behave)
        run: behave tests/features/ --no-capture
        env:
          SECRET_KEY: test-secret-key-min-32-chars-here!!
          ENCRYPTION_KEY: test-encrypt-32-bytes-padding-here!
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

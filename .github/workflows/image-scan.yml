name: Container Image Scan

on:
  workflow_run:
    workflows: ["CipherFlow CI/CD Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  scan-backend:
    name: Scan backend image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cipherflow-scan:backend .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cipherflow-scan:backend
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  scan-frontend:
    name: Scan frontend image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t cipherflow-scan:frontend ./frontend

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cipherflow-scan:frontend
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true
